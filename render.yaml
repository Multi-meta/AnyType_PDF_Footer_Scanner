# Render deployment configuration
# https://render.com/docs/render-yaml-spec

services:
  - type: web
    name: pdf-footer-scanner-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    # Render's free tier auto-sleeps after inactivity — upgrade for production
    plan: free
    region: oregon

    envVars:
      - key: NODE_ENV
        value: production

      - key: PORT
        value: 10000

      # Set this to your Vercel frontend URL after deploying the frontend.
      # Example: https://your-app.vercel.app
      # This controls the CORS allowed origin.
      - key: FRONTEND_URL
        sync: false   # you set this manually in Render dashboard

      # Optional: override Python path (defaults to python3 in Docker)
      - key: PDF_FOOTER_SCANNER_PYTHON
        value: python3

    # Persistent disk so scan results survive restarts
    disk:
      name: scan-results
      mountPath: /app/results
      sizeGB: 1
